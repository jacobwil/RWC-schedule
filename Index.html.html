ly reconstruct the underlying datasets, showing that they fall short of their stated privacy claims while still satisfying the DP notion. \r\nThis suggests that applying a privacy notion outside its intended context can fail to provide meaningful semantic security and much care must be taken when constructing such systems.","affiliations":["ETH Zurich","Eindhoven University of Technology"],"authors":["Daniel P\u00f6llmann","Tianxin Tang"],"id":"talk-65","paperId":97,"title":"Sprinkle Differential Privacy on a Bit of Everything","speakers":"Daniel P\u00f6llmann"}]}]},{"starttime":"10:20","endtime":"10:50","sessions":[{"id":"session-21","session_title":"Coffee break"}]},{"starttime":"10:50","endtime":"11:30","sessions":[{"id":"session-22","moderator":"Chair: Peter Schwabe","session_title":"Bluetooth-based Protocols","talks":[{"abstract":"Bluetooth is a short-range technology for wireless communication between devices. It is equipped with a set of protocols for key exchange and for protecting the communication between devices. Nonetheless, cryptographic investigations of the Bluetooth protocols are surprisingly sparse so far. This appears peculiar, given that 4.9 billion devices supporting Bluetooth were shipped in 2024, according to the Bluetooth Special Interest Group (SIG), with numbers expected to reach 7.7 billion by 2029. This should be compared to the 306 million SSL certificates on the Internet (as of July 2025), and to the 193.8 million total downloads of the Signal app (as of June 2025), as well as the attention these protocols have received from the cryptographic community.\r\n\r\nThis talk will give an evaluation of the current state of cryptographic strength of Bluetooth's protocols. The content of the talk relies on several works by the authors (Fishlin and Sanina, Asiacrypt'21, CCS'24, CAW'25). It would be of interest to industries that use Bluetooth for their needs, cryptographers looking for critical topics to work on, and policymakers who need to standardize the use of Bluetooth in their organizations.","affiliations":["Technische Universit\u00e4t Darmstadt"],"authors":["Marc Fischlin","Olga Sanina"],"id":"talk-38","paperId":26,"title":"Security of Bluetooth: A Cryptographic View on Analyzing a Leviathan","speakers":"Olga Sanina"},{"abstract":"Offline finding (OF) protocols---such as Apple's Find My, Google's Find Hub, Samsung\u2019s SmartThingsFind, and Tile---enable hundreds of millions of users to track their belongings via Bluetooth-based tracker tags. However, the scale and tracking capabilities of these systems give rise to significant privacy risks, leaking the locations of normal users and facilitating stalking. In response, academics and practitioners have suggested cryptographic and non-cryptographic mitigations to improve privacy and anti-stalking protections, working to navigate complex tensions between these goals. The result is a large landscape of privacy goals, threat models, protocol designs, implementations, and analyses.\r\n\r\nThe purpose of this talk is to reveal how the large-scale deployment of OF protocols has exposed deep tensions between privacy, safety, and interoperability, and to motivate cryptographic and systems research that can help reconcile these goals in future OF systems. We will use our analysis of Tile's protocol as an example of how flawed design choices can undermine user privacy and safety. Building on this, we will present a set of \"baseline\" security goals for OF systems distilled from a variety of academic and industry literature. As a starting point, we will provide a high-level overview of a simple, secure protocol that can be viewed as a ``textbook'' OF protocol.  Then, we will report on the state of all major deployed protocols with respect to these security goals, and discuss the design decisions and vulnerabilities that prevent them from achieving certain properties. Finally, we will motivate accountability as an important-but-missing goal in these systems and provide general takeaways and directions for future work.","affiliations":["Georgia Institute of Technology","Cornell University","Cornell Tech"],"authors":["Akshaya Kumar","Carolina Ortega Perez","Anna Raymaker","Joseph Jaeger","Michael Specter","Thomas Ristenpart"],"id":"talk-50","paperId":44,"title":"The Landscape of Offline Finding Protocols: Privacy, Safety, Problems","speakers":"Akshaya Kumar and Carolina Ortega P\u00e9rez"}]}]},{"starttime":"11:30","endtime":"12:00","sessions":[{"id":"session-77","moderator":"Chair: Nigel Smart","session_title":"Lightning Talks"}]},{"starttime":"12:00","endtime":"13:20","sessions":[{"id":"session-24","session_title":"Lunch"}]},{"starttime":"13:20","endtime":"13:50","sessions":[{"id":"session-23","session_title":"Invited Talk ","talks":[{"abstract":"My colleagues and I installed a satellite dish on the roof of our department at UCSD, which gave us an unexpected view into network traffic traveling over geostationary satellites.  Much of this traffic was unencrypted, and we have been working to help organizations secure their networks.  However we also see encrypted protocols.  In this talk I will share insights on the protocols and choices we see for critical infrastructure in practice.","affiliations":"University of California, San Diego","authors":["Nadia Heninger"],"id":"talk-82","paperId":"inv-4","title":"A bird's-eye view of cryptographic practice"}]}]},{"starttime":"13:50","endtime":"14:45","sessions":[{"id":"session-25","moderator":"Chair: Paul Grubbs","session_title":"PKI","talks":[{"abstract":"The Web PKI is the foundation on which many security systems depend, and for many the gold standard of how to do PKI. On closer inspection, the Web PKI is an old system evolved with patches added from one crisis to the next. In this talk, we discuss recent efforts to modernize the Web PKI to maintain reliability and security in the face of scaling challenges, new compliance requirements, and the imminent threat from quantum computers. We will share our experience in implementing and adopting the Static CT API, and designing and experimenting at scale with Merkle Tree Certificates.\r\n\r\nOne famous patch to the Web PKI is Certificate Transparency (CT), the system that allows everyone to monitor which certificates are issued for their domains. Since its inception in 2013, CT has served its purpose of holding Certificate Authorities (CAs) accountable, earning it recognition by the Levchin prize at RWC 2024. In 2025, CT again demonstrated its value with its role in detecting Fina CA\u2019s mis-issuance of certificates for 1.1.1.1, Cloudflare\u2019s Encrypted DNS service.\r\n\r\nDespite its success, CT has its issues. CT log operators have struggled to meet uptime and integrity requirements, and with the Internet\u2019s continued growth and new demands like reduced certificate lifetimes and post-quantum keys, the challenges continue to pile up. We need another patch. The Static CT API, a new design for CT presented at RWC 2024, provides a backwards-compatible fix to help CT scale in the medium term, making operating CT logs cheaper and less error-prone. The CT community has embraced the new design, and we\u2019ve seen significant ecosystem adoption with new log implementations, monitor support, and incorporation into CT program policies.\r\n\r\nThe Static CT API helps to ameliorate CT\u2019s immediate scaling issues, but the issues facing the Web PKI do not stop there. The next challenge is the existential threat of large-scale quantum computers that will break classical cryptography. New standards for post-quantum cryptography (PQC) provide a way forward, but adoption in protocols like TLS is hindered by performance degradations if PQC is used as a drop-in replacement for classical cryptography\u2014not to mention the increased load that larger post-quantum certificates would pose on the already-strained CT ecosystem. New efforts in the Internet Engineering Task Force (IETF) prospective PKI, Logs, and Tree Signatures (PLANTS) working group seek to tackle this problem with new designs for the Web PKI to make it fast, scalable, quantum-resistant, and transparent-by-default. We walk through one proposal, Merkle Tree Certificates, that has garnered significant industry support, and present the results of early experimentation between Chrome and Cloudflare.","affiliations":["Cloudflare, Inc.","Google","Let's Encrypt",""],"authors":["Luke Valenta","David Benjamin","Matthew McPherrin","Filippo Valsorda"],"id":"talk-35","paperId":21,"title":"(Dis)patches from the Web PKI: Fina, Static CT, MTC, and PLANTS","speakers":"Luke Valenta"},{"abstract":"Private key leaks represent a critical security vulnerability, with over 600,000 leaked keys on GitHub in 2024, yet their real-world impact remains largely unknown due to the challenge of linking these mathematical objects to their operational usage. We present the first systematic analysis mapping leaked private keys to active certificates, combining GitGuardian's dataset of 945,560 unique leaked private keys with Google's historical Certificate Transparency databases. Our methodology successfully mapped 42,690 private keys to 139,767 certificates, revealing the impact of private keys leaked on GitHub and DockerHub. Using custom online and offline validation, we identified 2,622 valid certificates, enabling website impersonation and MITM attacks. Our analysis reveals systematic failures in certificate revocation practices, with only 80 certificates revoked via CRL\/OCSP and just 3 properly marked as key-compromised. Finally, we successfully attributed certificates to 600 organizations across critical industries, though many could not be mapped to identifiable owners. With 20% of valid certificates having been exposed for over two years, our large-scale responsible disclosure campaign sent thousands of emails and revealed significant challenges in reaching certificate owners.","affiliations":["GitGuardian","Google"],"authors":["Guillaume VALADON","Ga\u00ebtan FERRY","David TAO","Philippe BONEFF"],"id":"talk-44","paperId":36,"title":"Private Key Leaks in the Wild: Insights from Certificate Transparency","speakers":"Guillaume Valadon, Ga\u00ebtan Ferry","slidesUrl":"https:\/\/iacr.org\/submit\/files\/slides\/2026\/rwc\/rwc2026\/36\/36_slides.pdf"},{"abstract":"Key transparency has gained significant attention in recent years, with major messaging applications such as WhatsApp and iMessage\u2014serving billions of users\u2014already deploying it. However, a major challenge in current practical deployments is the large size of audit proofs. Concretely, auditing WhatsApp\u2019s key transparency requires computation equivalent to hashing hundreds of megabytes of data every minute, which is impractical for everyday users, especially those on mobile devices. Consequently, the auditing task is delegated to a small set of non-profit organizations, such as Cloudflare, that perform the audits on behalf of users. In essence, billions of users must trust a handful of third-party entities to verify their security, which introduces a significant trust bottleneck. Our work aims to eliminate this dependency by making the auditing process lightweight enough for users themselves to perform securely and efficiently, which benefits billions of users in privacy.","affiliations":["New York University","University of Pennsylvania"],"authors":["Hossein Hafezi","Alireza Shirzad","Benedikt Bunz","Joseph Bonneu"],"id":"talk-33","paperId":16,"title":"Self-Auditable Key Transparency at Scale","speakers":"Hossein Hafezi","slidesUrl":"https:\/\/iacr.org\/submit\/files\/slides\/2026\/rwc\/rwc2026\/16\/16_slides.pdf"}]}]},{"starttime":"14:45","endtime":"15:15","sessions":[{"id":"session-26","session_title":"Coffee Break"}]},{"starttime":"15:15","endtime":"16:10","sessions":[{"id":"session-27","moderator":"Chair: Marie-Sarah Lacharit\u00e9","session_title":"Secure Channels in Practice","talks":[{"abstract":"DTLS-SRTP was designed to secure real-time media communication and is found in prominent audio and video call platforms, including Discord, Zoom, and Microsoft Teams. Notably, it is part of Web Real-Time Communication (WebRTC), a web standard enabling real-time communication in the browser. To this end, WebRTC uses multiple technologies, including HTTP, TLS, SDP, ICE, STUN, TURN, UDP, TCP, DTLS, (S)RTP, (S)RTCP, and SCTP. This amalgamation of technologies gives rise to an overly complex system that is very challenging to audit in a systematic and automated manner. As a result, the security of deployments of this core modern communication technology remains largely unexplored.\r\n\r\nIn this work, we aim to close this gap by developing an automated MitM testing framework to test the DTLS channel of a DTLS-SRTP connection.  We use our framework to study the current state of the ecosystem in a case study spanning 24 service providers across their browser and mobile applications. Our analysis puts special emphasis on the authentication mechanism in DTLS-SRTP, where we test for 19 potential vulnerabilities that could lead to authentication bypasses for both the client and server. We find that among the 33 tested media server implementations, 19 contained vulnerabilities allowing an attacker to break authentication at the DTLS layer. For 8 of the affected systems, which serve hundreds of millions of users, we could also demonstrate that they could be exploited by an attacker to retrieve media data, assuming only Man-in-the-Middle capabilities. We highlight the impact of these vulnerabilities by building a Proof-of-Concept exploit to listen to Webex video conference calls.","affiliations":["TU Darmstadt","Technology Innovation Institute","Ruhr-University Bo\u00adchum"],"authors":["Martin Bach","Jean Paul Degabriele","Vuka\u0161in Karad\u017ei\u0107","Lukas Knittel","Robert Merget"],"id":"talk-61","paperId":85,"title":"DTLS-SRTP: The Protocol Everyone is Using But Nobody is Checking","speakers":"Robert Merget"},{"abstract":"TLS is not as universal as we might think. Applications with hundreds of millions of active users continue to use insecure, home-rolled proprietary network encryption to protect sensitive user data. This talk demonstrates that this is a widespread and systemic issue affecting a large portion of the most popular applications in the world.\r\n\r\nWe demonstrates that HTTPS is, in fact, not everywhere, and that a massive portion of mobile network communications remains poorly encrypted and accessible to systems of mass surveillance. These issues are particularly concentrated in mobile applications developed in China, which have been overlooked by the global security community despite their massive popularity and influence.\r\n\r\nWe performed a large-scale measurement to evaluate the network security of 1.7k Android apps, we found that (1) 47.6% of top Mi Store applications use proprietary network cryptography without any additional encryption, compared to only 3.51% of top Google Play Store applications, and that (2) these proprietary protocols often contain basic flaws in their construction.\r\n\r\nWe analyzed the 18 most popular protocols, which belonged to 9 protocol families. 7 of these protocol families allowed network eavesdroppers to passively decrypt underlying data, including browsing data and device metadata, among various other issues, such as being downgradable, not validating TLS certificates, and the use of RSA without OAEP. These vulnerabilities affected 26.9% of our Mi Store dataset with a cumulative 130 billion downloads.\r\n\r\nThrough the vulnerabilities fixed as a result of this work, this research has directly improved the network security of up to one billion people. However, there were hundreds more proprietary protocols used by popular applications that we discovered. Verifying all of their security through manual reverse-engineering and vulnerability reporting is not feasible at this scale. What can we do as a community to fix this systemic issue and prevent such failures from occurring in the future?","affiliations":["UC Berkeley","The Citizen Lab","Princeton University"],"authors":["Mona Wang","Jeffrey Knockel","Zo\u00eb Reichert","Prateek Mittal","Jonathan Mayer"],"id":"talk-52","paperId":48,"title":"The widespread popularity of insecure proprietary network encryption in the Android ecosystem","speakers":"Mona Wang"},{"abstract":"TLS has become *the* protocol for securing web traffic. This comes at the cost of performance: before data can be transmitted, TLS uses public key cryptography to establish key material and authenticate the server. As a shortcut to these computations, TLS session resumption can be used, where authenticity is established by both sides remembering key material. One form of this is session resumption with *session tickets*. The tickets are issued by the server and contain the key material needed for resumption.\r\n\r\nThe specification\u00a0provides a secure recommendation for constructing tickets, but does not mandate that servers use this construction. Open-source libraries follow these recommendations. Nonetheless, we discovered over 2000 deployed servers which used trivial keys to encrypt the tickets (similar to \u00a0CVE-2020-13777), the largest chunk belonging to AWS. Even if tickets are correctly constructed, virtual host confusion with session tickets was previously found. Our systematic analysis found that Fastly and Cloudflare are vulnerable. We further uncovered new client authentication bypasses in all four analyzed open-source implementations and Cloudflare.\r\n\r\nIn this talk, we highlight the fragility of cryptographic shortcuts on the example of TLS session tickets. We present how this mechanism, which is secure on paper, practically affects forward secrecy, confidentiality, and authenticity. We outline general observations on why cryptography shortcuts harm security:\r\n\r\n**API Design.** The newly uncovered vulnerabilities were known to OpenSSL developers back in 1999, who introduced APIs to prevent this exact issue. Our findings have shown that the mere existence of this API is not enough if developers can easily misuse the library. We argue that TLS libraries could improve their APIs to prevent all the discussed vulnerabilities.\r\n\r\n**Protocol Design.** Even with good APIs, the client cannot know whether the server is securely set up. The session ticket encryption key is the only symmetric key in TLS that the server can choose freely (i.e., is not derived using a KDF). All other keys that the server can choose are asymmetric keys, and therefore auditable (to some degree). We consider this an oversight in the protocol design, as this key can completely undermine the security guarantees of TLS.\r\n\r\n**TLS is not Plug-and-Play.** Integrating TLS into higher-layer protocols is not trivial. Merely tunneling a higher-layer (e.g., HTTP) through TLS and handling the layers independently can lead to vulnerabilities. In the case of HTTPS, both HTTP and TLS support virtual hosting. We have observed that servers can be confused about which virtual host to serve and whether the client is authenticated for this virtual host.","affiliations":["Paderborn University","Paderborn University and achelos GmbH","Ruhr University Bochum","Technology Innovation Institute"],"authors":["Sven Hebrok","Tim Leonhard Storm","Felix Matthias Cramer","Maximilian Radoy","Simon Nachtigall","Marcel Maehren","Nurullah Erinola","Juraj Somorovsky","Robert Merget","J\u00f6rg Schwenk"],"id":"talk-41","paperId":32,"title":"Lessons Learned from Cryptography Shortcuts on the Example of TLS Session Tickets","speakers":"Sven Hebrok"}]}]},{"starttime":"16:10","endtime":"16:30","sessions":[{"id":"session-79","moderator":"RWC2026 General Chair","session_title":"Closing Remarks"}]}]}],"name":"20260228 Real World Cryptography 2026 Program","tabbedSessions":false,"twoSessions":false};
const TZ='Asia/Taipei';
function pv(d,t){return new Date(d+'T'+t.padStart(5,'0')+':00+08:00')}
function fl(d){return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}
function ltz(){try{return Intl.DateTimeFormat().resolvedOptions().timeZone}catch{return''}}
function e(s){return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}

function fmtAbs(t){
  t=t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  return t.split(/\n\n+/).map(p=>'<p>'+p.replace(/\n/g,'<br>')+'</p>').join('');
}

const ABS={};

function build(){
  const root=document.getElementById('R');
  const now=new Date(),myTz=ltz(),showLoc=myTz&&myTz!==TZ;
  let nowId=null,futId=null;
  const h=[];

  for(const day of P.days)for(const ts of day.timeslots){
    const id='ts-'+day.date+'-'+ts.starttime.replace(':','');
    ts._id=id;ts._s=pv(day.date,ts.starttime);ts._e=pv(day.date,ts.endtime);
    if(now>=ts._s&&now<ts._e)nowId=id;
    if(!futId&&ts._s>now)futId=id;
  }

  for(const day of P.days){
    const[y,m,d]=day.date.split('-').map(Number);
    const dl=new Date(y,m-1,d).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
    h.push('<section id="day-'+day.date+'"><h2 class="dh">'+dl+'</h2>');

    for(const ts of day.timeslots){
      const hasTalks=ts.sessions.some(s=>s.talks&&s.talks.length);
      const brk=!hasTalks,isN=ts._id===nowId;
      let c='ts';if(brk)c+=' brk';if(isN)c+=' now';

      h.push('<div id="'+ts._id+'" class="'+c+'"><div class="tc">');
      if(isN)h.push('<span class="nd"></span>');
      h.push('<span>'+ts.starttime+'\u2013'+ts.endtime+'</span>');
      if(showLoc)h.push('<span class="lt">'+fl(ts._s)+'\u2013'+fl(ts._e)+'</span>');
      h.push('</div><div class="sc">');

      if(brk){
        h.push('<div class="bl">'+e(ts.sessions[0]?.session_title||'Break')+'</div>');
      }else{
        for(const ss of ts.sessions){
          h.push('<div class="card"><div class="st">'+e(ss.session_title)+'</div>');
          if(ss.moderator)h.push('<div class="sch">'+e(ss.moderator)+'</div>');
          if(ss.talks)for(const tk of ss.talks){
            h.push('<div class="talk"><div class="tt">'+e(tk.title)+'</div><div class="ta">');
            if(tk.speakers){
              h.push('<span class="spk">\u21b3 '+e(tk.speakers)+'</span>');
              if(tk.authors&&tk.authors.length&&tk.authors[0])h.push(' \u00b7 '+e(tk.authors.join(', ')));
            }else if(tk.authors&&tk.authors.length&&tk.authors[0])h.push(e(tk.authors.join(', ')));
            h.push('</div><div class="tl">');
            if(tk.slidesUrl)h.push('<a class="tlk" href="'+tk.slidesUrl+'" target="_blank" rel="noopener">SLIDES</a>');
            if(tk.abstract){
              ABS[tk.id]=tk.abstract;
              h.push('<button class="ab" data-id="'+tk.id+'" onclick="togAbs(this)">abstract</button>');
            }
            h.push('</div>');
            if(tk.abstract)h.push('<div class="abd" id="abs-'+tk.id+'"></div>');
            h.push('</div>');
          }
          h.push('</div>');
        }
      }
      h.push('</div></div>');
    }
    h.push('</section>');
  }

  root.innerHTML=h.join('');

  const tgt=nowId||futId;
  if(tgt){const el=document.getElementById(tgt);if(el)setTimeout(()=>{
    const nh=document.querySelector('.nav')?.offsetHeight||48;
    window.scrollTo({top:el.getBoundingClientRect().top+window.scrollY-nh-10,behavior:'smooth'});
  },40);}

  const tabs=document.querySelectorAll('.nav a');
  const obs=new IntersectionObserver(ents=>{
    for(const en of ents)if(en.isIntersecting){
      const id=en.target.id.replace('day-','');
      tabs.forEach(t=>t.classList.toggle('active',t.dataset.day===id));
    }
  },{rootMargin:'-35% 0px -55% 0px'});
  document.querySelectorAll('section[id^="day-"]').forEach(s=>obs.observe(s));
}

function togAbs(btn){
  const id=btn.dataset.id,div=document.getElementById('abs-'+id);
  if(!div)return;
  const open=div.classList.toggle('open');
  btn.textContent=open?'hide':'abstract';
  if(open&&!div.innerHTML)div.innerHTML=fmtAbs(ABS[id]);
}

function goNow(){
  const now=new Date();let tid=null,fid=null;
  for(const day of P.days)for(const ts of day.timeslots){
    const id='ts-'+day.date+'-'+ts.starttime.replace(':','');
    const s=pv(day.date,ts.starttime),en=pv(day.date,ts.endtime);
    if(now>=s&&now<en){tid=id;break}
    if(s>now&&!fid)fid=id;
  }
  const el=document.getElementById(tid||fid);
  if(el){const nh=document.querySelector('.nav')?.offsetHeight||48;
    window.scrollTo({top:el.getBoundingClientRect().top+window.scrollY-nh-10,behavior:'smooth'});}
}

(function(){
  const tz=ltz(),lb=document.getElementById('tzl');
  if(lb&&tz&&tz!==TZ)lb.textContent='Your tz: '+tz;
  else if(lb)lb.remove();
})();

build();
</script>
</body>
