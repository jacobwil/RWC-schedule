<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0f11;--bg2:#14161a;--border:#2a2d35;
  --amber:#e8a020;--amber-dim:#a06a0a;
  --text:#d8dae0;--text-muted:#717580;--text-bright:#f0f2f7;
  --session-bg:#181b22;--highlight:rgba(232,160,32,.12);
  --mono:ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,monospace;
  --sans:system-ui,-apple-system,sans-serif;
  --serif:Georgia,'Times New Roman',serif;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;line-height:1.6}

.hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:1.1rem 1rem .8rem}
.hdr-in{max-width:900px;margin:0 auto}
.hdr-eye{font-family:var(--mono);font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--amber);margin-bottom:.2rem}
.hdr-eye a{color:inherit;text-decoration:none}
.hdr-eye a:hover{text-decoration:underline}
.hdr-t{font-family:var(--serif);font-size:clamp(1.4rem,4vw,2.4rem);font-weight:normal;color:var(--text-bright);line-height:1.15}
.hdr-t em{font-style:italic;color:var(--amber)}
.hdr-m{margin-top:.35rem;font-size:.72rem;color:var(--text-muted);font-family:var(--mono);display:flex;gap:.9rem;flex-wrap:wrap}

.nav{position:sticky;top:0;z-index:100;background:rgba(14,15,17,.96);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:0 1rem;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-in{max-width:900px;margin:0 auto;display:flex;align-items:center;min-width:max-content}
.nav a{font-family:var(--mono);font-size:.7rem;letter-spacing:.04em;color:var(--text-muted);text-decoration:none;padding:.65rem .85rem;border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s,border-color .15s}
.nav a:hover{color:var(--text-bright);border-bottom-color:var(--border)}
.nav a.active{color:var(--amber);border-bottom-color:var(--amber)}
.nbtn{margin-left:auto;font-family:var(--mono);font-size:.66rem;color:var(--amber);background:0 0;border:1px solid var(--amber-dim);border-radius:2px;padding:.2rem .55rem;cursor:pointer;white-space:nowrap}
.nbtn:hover{background:var(--highlight)}

.main{max-width:900px;margin:0 auto;padding:1rem}
.dh{font-family:var(--serif);font-size:1.25rem;color:var(--text-bright);padding:1.2rem 0 .6rem;border-top:1px solid var(--border);margin-top:.3rem}

.ts{display:grid;grid-template-columns:88px 1fr;margin-bottom:2px}
.ts.brk{margin-bottom:1px}
.ts.now{background:var(--highlight);border-left:2px solid var(--amber);border-radius:0 2px 2px 0}
.tc{padding:.6rem .5rem .6rem 0;font-family:var(--mono);font-size:.68rem;color:var(--text-muted);text-align:right;line-height:1.3}
.tc .lt{display:block;font-size:.6rem;margin-top:.1rem;opacity:.6}
.nd{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--amber);margin-right:3px;vertical-align:middle;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.sc{border-left:1px solid var(--border);padding:.5rem 0 .5rem .8rem}
.ts.brk .sc{border-left-color:transparent}

.card{background:var(--session-bg);border:1px solid var(--border);border-radius:3px;padding:.6rem .7rem;margin-bottom:3px}
.card:last-child{margin-bottom:0}
.st{font-size:.73rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--amber);margin-bottom:.12rem}
.sch{font-size:.7rem;color:var(--text-muted);margin-bottom:.35rem;font-style:italic}
.bl{font-family:var(--mono);font-size:.66rem;color:var(--text-muted);padding:.35rem 0;letter-spacing:.04em}

.talk{padding:.4rem 0;border-top:1px solid var(--border)}
.talk:first-child{border-top:none}
.tt{font-size:.82rem;font-weight:600;color:var(--text-bright);line-height:1.3;margin-bottom:.1rem}
.ta{font-size:.72rem;color:var(--text-muted);line-height:1.4}
.ta .spk{color:var(--text)}
.tl{margin-top:.2rem;display:flex;gap:.3rem;flex-wrap:wrap;align-items:center}
.tlk{font-family:var(--mono);font-size:.6rem;letter-spacing:.04em;color:var(--amber-dim);text-decoration:none;border:1px solid var(--amber-dim);padding:.06rem .28rem;border-radius:2px;transition:color .12s,border-color .12s}
.tlk:hover{color:var(--amber);border-color:var(--amber)}
.ab{font-family:var(--mono);font-size:.6rem;color:var(--text-muted);background:0 0;border:0;cursor:pointer;padding:0;text-decoration:underline;text-underline-offset:2px}
.ab:hover{color:var(--text)}
.abd{display:none;margin-top:.3rem;font-size:.74rem;color:var(--text-muted);line-height:1.5;border-left:2px solid var(--border);padding-left:.6rem}
.abd.open{display:block}
.abd p{margin-bottom:.35em}
.abd p:last-child{margin-bottom:0}

@media(max-width:600px){
  .ts{grid-template-columns:64px 1fr}
  .tc{font-size:.6rem;padding:.45rem .25rem .45rem 0}
  .sc{padding:.45rem 0 .45rem .5rem}
  .card{padding:.45rem .5rem}
  .tt{font-size:.78rem}
  .ta{font-size:.68rem}
  .hdr{padding:.9rem .7rem .65rem}
  .main{padding:.8rem .7rem}
  .nav a{padding:.6rem .65rem;font-size:.65rem}
}
</style>

<script>
const P={"config":{"default_talk_minutes":25,"default_track_locations":[{"name":"Enter a location"}],"timezone":{"abbr":"Asia\/Taipei","name":"Asia\/Taipei"},"unassigned_talks":[{"id":"category-71","name":"Uncategorized","talks":[]}],"uniqueIDIndex":86},"database_id":"2095","days":[{"date":"2026-03-09","timeslots":[{"starttime":"8:00","endtime":"9:00","sessions":[{"id":"session-1","session_title":"Registration"}]},{"starttime":"9:00","endtime":"9:15","sessions":[{"id":"session-2","moderator":"RWC 2026 General Chair","session_title":"Welcome"}]},{"starttime":"9:15","endtime":"10:35","sessions":[{"id":"session-3","moderator":"Chair: Cas Cremers","session_title":"Beyond Secure Messaging","talks":[{"abstract":"**This talk is based on the paper \u201cGeneric Anonymity Wrapper for Messaging Protocols\u201d which appears at CCS\u201925. This RWC talk focuses on presenting the most impactful and practical findings from the paper.**\r\n\r\nEnd-to-end encryption in modern messengers ensures the confidentiality of user messages so that network observers or servers cannot learn the content of messages. Even if devices are ever temporarily compromised and encryption keys are leaked, e.g., by trojans or at airport security, the protocols guarantee that past and future communication remains confidential. While confidentiality of protocols has been studied intensively, comparatively little attention was given to the anonymity of protocols. That is, in protocols like Double Ratchet or MLS, not only the ciphertext is transmitted, but also attached metadata, like sender and receiver ID. A server which observes all incoming and outgoing traffic can analyze this metadata to reveal social networks and can ultimately even learn the identity of communicating parties. This is particularly threatening for vulnerable user groups: For instance, journalists who communicate with activists rely on guaranteed anonymity. In fact, the former NSA director, Michael Hayden, made the significance of metadata undoubtedly clear when he said, \u201cWe kill people based on metadata.\u201d\r\n\r\nThe only widely used messenger, to the best of our knowledge, which currently implements measures to hide metadata is Signal. More concretely, Signal\u2019s Sealed Sender protocol functions as a wrapper protocol around ciphertexts and metadata to provide sender anonymity. While this is a commendable development, Sealed Sender comes with drawbacks. First, the protocol relies on the receiver\u2019s static long term keys. Considering that messaging sessions can last for months or years, it is likely that, at some point, the receiver keys become compromised. This immediately allows de-anonymization of all previous and future communication. Second, Sealed Sender is inefficient in group chats: Without Sealed Sender, the sender creates a constant-size ciphertext which all group members can decrypt. With Sealed Sender, the sender re-encrypts this ciphertext for each recipient, which means that the ciphertext size increases linearly in the number of group members. \r\n\r\nIn this talk, I present our practical anonymity wrapper protocol which fixes both these drawbacks of Sealed Sender and can be used to hide metadata of existing (group) messaging protocols. The key idea is that the communicating parties use the shared key material of the underlying messaging protocol to derive wrapper keys. In group communication, the resulting ciphertext size is constant. Moreover, our protocol provides strong anonymity guarantees such that, even if encryption secrets are ever compromised, past and future communication remains anonymous. We implement this approach and compare it to Signal\u2019s Sealed Sender: The performance evaluation shows that the wire size of small 1:1 messages goes down from 441 bytes to 114 bytes. For a group of 100 members, it reduces the wire size of outgoing group messages from 7240 bytes to 155 bytes. We see similar improvements in computation time for encryption and decryption, but these improvements come with substantial storage costs for receivers. Yet, by using a Bloom Filter to compress the receiver state, we are able to make this approach practical: Our resulting protocol is efficient and has a storage overhead of only a few hundred bytes for the sender and a few kilobytes for the receiver. Since this significantly improves on the currently deployed Sealed Sender protocol, Signal considers employing this solution.","affiliations":["FAU Erlangen-N\u00fcrnberg","J.P. Morgan AI Research and J.P. Morgan AlgoCRYPT CoE","Signal Messenger","New York University"],"authors":["Lea Thiemt","Paul R\u00f6sler","Alexander Bienstock","Rolfe Schmidt","Yevgeniy Dodis"],"id":"talk-32","paperId":15,"title":"A Practical Wrapper Protocol for Metadata-Hiding in Messaging","speakers":"Sebastian Faller, Rolfe Schmidt","slidesUrl":"https:\/\/iacr.org\/submit\/files\/slides\/2026\/rwc\/rwc2026\/15\/15_slides.pptx"},{"abstract":"Facebook Messenger recently added a new feature called Advanced Browsing Protection, which is based around a private information retrieval (PIR) protocol that is triggered when a user clicks on a link in a Messenger end-to-end encrypted chat thread. The user's link is matched against a large server-side database of malicious links, without revealing the plaintext link or the outcome of the match to the server.\r\n\r\nWe will discuss the design decisions we made and also the challenges we faced when realizing this cryptographic primitive in practice.","affiliations":["Meta"],"authors":["Emma Connor","Artem Ignatyev","Kevin Lewi"],"id":"talk-51","paperId":46,"title":"Advanced Browsing Protection for Facebook Messenger","speakers":"Emma Connor, Kevin Lewi","slidesUrl":"https:\/\/iacr.org\/submit\/files\/slides\/2026\/rwc\/rwc2026\/46\/46_slides.pdf"},{"abstract":"The web is the universal application platform, but there are some applications you cannot safely run in a browser today. Consider an end-to-end encrypted messenger whose encryption code executes entirely client-side in Javascript. There is nothing preventing the server from sending a specific user some malicious Javascript code to exfiltrate all their messages. Further, this attack would be effectively undetectable by the user, and leave no trace.\n\nSmartphone apps don't have this problem. This is because app stores perform lots of security-specific operations: they scan for known malware, they verify developers\u2019 code signing, they show developers all apps deployed under their developer ID, and they distribute the same binary to every end user. It would be nice if we could achieve app store-like guarantees for web applications, without the centralizing effects of a private app store.\n\nIn this talk, we discuss efforts among browser vendors, cloud providers, and encrypted communication developers to bring app store-like security guarantees to the entire web. We will present an overview of already deployed systems\u2014CodeVerify by Meta and WEBCAT by the Freedom of the Press Foundation\u2014as well as a developing standard called Web Application Integrity, Consistency, and Transparency (WAICT), which aims to unify these approaches, embed them natively in browsers, and scale these guarantees across the whole web.","affiliations":"Meta,Freedom of Press Foundation,Mozilla,Proton AG,Cloudflare","authors":["Ezzudin Alkotob","Giulio Berra","Benjamin Beurdouche","Richard Hansen","Daniel Huigens","Dennis Jackson","Cory Francis Myers","Michael Rosenberg"],"id":"talk-57","paperId":"62","title":"Improving the Trustworthiness of Javascript on the Web","speakers":"Michael Rosenberg, Giulio Berra, Ezzudin Alkotob, Dennis Jackson","slidesUrl":"https:\/\/iacr.org\/submit\/files\/slides\/2026\/rwc\/rwc2026\/62\/62_slides.pdf"},{"abstract":"We present an attack against the integrity of conversations in Signal: we show that a malicious server can inject messages into a conversation between two honest users without them being aware of it. The attack does not require any key compromises. While the attack causes the honest users to receive a notification that their safety numbers have changed, those safety numbers remain consistent, so the attack cannot be detected by comparing them out-of-band. This attack naturally gives rise to a number of questions. How was this vulnerability introduced? How can such a vulnerability still be present after the extensive security analysis to which Signal\u2019s protocols have been subjected? What wider lessons can be drawn in order to prevent similar issues arising in the future? We answer these questions in detail in our talk.","affiliations":["ETH Zurich","Max-Planck Institute for Security and Privacy"],"authors":["Kien Tuong Truong","Noemi Terzo","Peter Schwabe","Kenneth Paterson"],"id":"talk-40","paperId":29,"title":"Signal Lost (Integrity): The Signal App is More than the Sum of its Protocols","speakers":"Noemi Terzo, Kien Tuong Truong","slidesUrl":"https:\/\/iacr.org\/submit\/files\/slides\/2026\/rwc\/rwc2026\/29\/29_slides.pdf"}]}]},{"starttime":"10:35","endtime":"11:05","sessions":[{"id":"session-4","session_title":"Coffee break"}]},{"starttime":"11:05","endtime":"11:35","sessions":[{"id":"session-5","moderator":"Chair: Nadia Heninger","session_title":"Levchin Prize"}]},{"starttime":"11:35","endtime":"12:05","sessions":[{"id":"session-6","session_title":"Invited Talk","talks":[{"affiliations":"","authors":[""],"id":"talk-86","paperId":"inv-1","title":"Levchin Prize Awardee","slidesUrl":"https:\/\/iacr.org\/submit\/files\/slides\/2026\/rwc\/rwc2026\/inv-1\/inv-1_slides.pptx"}]}]},{"starttime":"12:05","endtime":"13:35","sessions":[{"id":"session-7","session_title":"Lunch"}]},{"starttime":"13:35","endtime":"15:10","sessions":[{"id":"session-8","moderator":"Chair: Chitchanok Chuengsatiansup","session_title":" Verification and Testing","talks":[{"abstract":"We used a metamorphic-testing-based approach to test implementations of hash functions, post-quantum candidate KEMs and signature algorithms, and found multiple interesting implementation bugs and some unexpected properties (of the schemes themselves). We used mostly known techniques and existing tools, but applied them based on our expectation of how a cryptographic primitive should behave. In this talk we share our experience, and encourage greater use of these (very accessible) techniques by describing how they can improve cryptographic implementations with limited effort.","affiliations":["EPFL","ETH Zurich","University of Surrey"],"authors":["Giacomo Fenzi","Jan Gilcher","Fernando Virdia"],"id":"talk-63","paperId":95,"title":"Finding Bugs and Features Using Cryptographically-Informed Functional Testing","speakers":"Fernando Virdia","slidesUrl":"https:\/\/iacr.org\/submit\/files\/slides\/2026\/rwc\/rwc2026\/95\/95_slides.pdf"},{"abstract":"In this talk we will present the Formosa Crypto  toolchain for end-to-end formally verified crypto software. As a running example we will present a highly optimized implementation of ML-KEM that features computer-verified proofs all the way from assembly to the IND-CCA security notion, together with extensive principled protections against various classes of microarchitectural attacks. We report on the deployment of this ML-KEM software in the backend infrastructure of the Signal secure messenger. \n\nWe furthermore report on a separate effort that uses the Formosa toolchain to build high-assurance crypto software for Signal's infrastructure, namely an implementation of oblivious RAM (ORAM). This effort provided additional motivation to expedite the integration of Formosa software in Signal, as it discovered a timing vulnerability in the existing C implementation of ORAM in Signal. We will provide details of how this vulnerability was discovered and how the Formosa toolchain systematically protects against such vulnerabilities in a future-proof way.","affiliations":"Universidade do Minho and INESC TEC,PQShield,Max Planck Institute for Security and Privacy,Universidade do Porto (FCUP) and INESC TEC,Max Planck Institute for Security and Privacy and IMDEA Software Institute,University of Melbourne,University of Bristol,Universit\u00e9 C\u00f4te d\u2019Azur, Inria,Max Planck Institute for Security and Privacy and Neodyme AG,Masaryk University,Universit\u00e9 de Lorraine, CNRS, Inria, LORIA,WisRoot Tech,Max Planck Institute for Security and Privacy and Least Authority,Signal,Max Planck Institute for Security and Privacy and Radboud University,LIX,Ruhr University Bochum, Eindhoven University of Technology and SandboxAQ","authors":["Jos\u00e9 Bacelar Almeida","Gustavo Xavier Delerue Marinho Alves","Santiago Arranz-Olmos","Manuel Barbosa","Francisca Barros","Gilles Barthe","Lionel Blatter","Chitchanok Chuengsatiansup","Ignacio Cuevas","Fran\u00e7ois Dupressoir","Lu\u00eds Esqu\u00edvel","Andreas H\u00fclsing","Benjamin Gr\u00e9goire","Ruben Gonzalez","Jan Jancar","Vincent Hwang","Vincent Laporte","Jean-Christophe L\u00e9chenet","Ting-han Lim","Cameron Low","Tiago Oliveira","Hugo Pacheco","Swarn Priya","Miguel Quaresma","Rolfe Schmidt","Peter Schwabe","Antoine S\u00e9r\u00e9","Basavesh Ammanaghatta Shivakumar","Pierre-Yves Strub","Lucas Tabary-Maujean","Yuval Yarom","Zhiyuan Zhang","Jieyu Zheng"],"id":"talk-49","paperId":"42","title":"Formosa Crypto: End-to-end formally verified crypto software","speakers":"Santiago Arranz-Olmos; Ignacio Cuevas","slidesUrl":"https:\/\/iacr.org\/submit\/files\/slides\/2026\/rwc\/rwc2026\/42\/42_slides.pdf"},{"abstract":"In this talk, we present mlkem-native: a high-performance, formally verified multi-platform implementation of ML-KEM\/FIPS-203 developed as part of the Post-Quantum Cryptography Alliance (PQCA) and the Linux Foundation.\r\nWe explain how we surveyed the similarities and the sometimes subtle differences between the ML-KEM reference implementation and its optimized research derivatives, and arrived at a modular design for mlkem-native combining a fixed C frontend with a backend that can be instantiated in C or via native code (assembly\/intrinsics). mlkem-native provides backends for C, AArch64, and x86-64 matching or exceeding the performance of prior art; backends for RISC-V64 and PPC64 have been provided by external contributors and are under review.\r\nWe describe our use of the C bounded model checker (CBMC) to verify memory- and type-safety for all C-code in mlkem-native. Further, we describe how we use the SLOTHY super-optimizer combined with the HOL-Light theorem prover and the s2n-bignum verification infrastructure to obtain a highly optimized native AArch64 backend that is formally verified for functional correctness at the binary level.\r\nFinally, we describe how we integrated mlkem-native as the default ML-KEM implementations into libOQS as well as AWS-LC, the FIPS-certified open source cryptography library from Amazon.","affiliations":["Amazon Web Services","Chelpis"],"authors":["Hanno Becker","Matthias J. Kannwischer","Dusan Kostic","John Harrison","Rod Chapman"],"id":"talk-47","paperId":39,"title":"mlkem-native: a unified, fast and verified ML-KEM library","speakers":"Hanno Becker","slidesUrl":"https:\/\/iacr.org\/submit\/files\/slides\/2026\/rwc\/rwc2026\/39\/39_slides.pdf"},{"abstract":"This talk will present recent progress in formally verifying the circuits used in zero-knowledge proofs (ZKPs). Most ZKPs prove the satisfiability of a circuit over a finite field. So, an application that uses a ZKP must translate its application-level properties (such as the validity of a financial transaction or an anonymous credential) into circuits. This translation process is the source of many real-world bugs that compromise the security of ZKP-based applications. In this talk, we will explain the problem of ZKP circuit correctness, and discuss recent progress in automated formal verification for ZKP circuits. This includes: automatic tools for verifying ZKP circuits, the real-world bugs they have found, the real-world circuits they have verified, and the SMT technology that they rely on.","affiliations":["MPI-SP \/ Georgia Tech","Veridise"],"authors":["Alex Ozdemir","Shankara Pailoor"],"id":"talk-31","paperId":10,"title":"Formally Verifying Circuits for Zero Knowledge Proofs","speakers":"Alex Ozdemir","slidesUrl":"https:\/\/iacr.org\/submit\/files\/slides\/2026\/rwc\/rwc2026\/10\/10_slides.pptx"},{"abstract":"Succinct non-interactive arguments of knowledge (SNARKs) are short, efficiently verifiable proofs that an untrusted party executed a computation correctly. Among many possible use cases, SNARKs have seen adoption as a scaling technology for blockchains, and currently secure billions of dollars in the Ethereum ecosystem.\r\n\r\nHowever, deploying SNARKs in production is difficult: the academic literature is rapidly evolving, and addressing performance requirements demands significant engineering efforts. This results in complex, constantly evolving software. Mistakes in either the specification or implementation of a SNARK can and do result in devastating soundness bugs.\r\n\r\nWe present ArkLib, a library in the Lean proof assistant for formally verifying SNARK protocols. ArkLib aims to bridge the gap between cryptographic literature and production code by presenting a unified framework for specifying and mechanically proving the security of SNARKs. The framework's core is a formalization of (functional) Interactive Oracle Reductions (IORs). This abstraction allows us to model protocols like sum-check and FRI as a series of IORs, and prove their security compositionally relying on generic transformations of IORs.\r\n\r\nTo realize this vision, we have developed foundational sub-libraries for oracle computations, computable polynomials, coding theory, and binary tower fields. Our large-scale, open-source effort is aided by AI-assisted formalization; we use AI tools to complete a number of proofs and identify misformalization issues, helping to manage the complexity of the library. While full end-to-end security proofs are ongoing, our work establishes the first mechanized theory of IORs and provides a path toward building verifiably secure SNARKs.","affiliations":["Carnegie Mellon University","Ethereum Foundation","University of Minnesota & Succinct","Nethermind","Imperial College London","Independent"],"authors":["Quang Dao","Alexander Hicks","Devon Tuma","Julian Sutherland","Katerina Hristova","Frantisek Silvasi","Ilia Vlasov","Chung Thai Nguyen"],"id":"talk-45","paperId":37,"title":"Compositional Formal Verification of SNARKs with ArkLib","speakers":"Quang Dao","slidesUrl":"https:\/\/iacr.org\/submit\/files\/slides\/2026\/rwc\/rwc2026\/37\/37_slides.pdf"}]}]},{"starttime":"15:15","endtime":"15:45","sessions":[{"id":"session-72","session_title":"Invited Talk","talks":[{"abstract":"Since its first implementation in 2011, Fully Homomorphic Encryption (FHE) has experienced rapid growth, with processing speeds improving sevenfold annually even without customized hardware. Consequently, many use cases have now reached the stage of real-time feasibility.\n\nIn this presentation, we introduce the latest performance benchmarks for FHE operations and bootstrapping on CPU\/GPU platforms and their applications including encrypted statistics and machine learning. In particular, we highlight recently proposed homomorphic matrix operations and their real-time applications in fields such as encrypted RAG and search. Finally, we examine the current implementation trends and practical applications of encrypted Large Language Models (LLMs).\n","affiliations":"Seoul National University and CryptoLab","authors":["Jung Hee Cheon"],"id":"talk-83","paperId":"inv-2","title":"Real-Time FHE Applications and the Era of Encrypted AI","slidesUrl":"https:\/\/iacr.org\/submit\/files\/slides\/2026\/rwc\/rwc2026\/inv-2\/inv-2_slides.pptx"}]}]},{"starttime":"15:45","endtime":"16:20","sessions":[{"id":"session-85","session_title":"Coffee Break"}]},{"starttime":"16:20","endtime":"18:00","sessions":[{"id":"session-10","moderator":"Chair: Veelasha Moonsamy","session_title":"Hardware","talks":[{"abstract":"Trusted execution environments (TEEs) aim to offer strong privacy and integrity guarantees even in the presence of root level attackers capable of arbitrarily modifying the system's software. Recently however, there has been a pivotal shift in TEE deployment, moving TEEs from enclaves running on PC-oriented hardware to confidential virtual machines executing on server-grade CPUs. Under the hood, this change has also resulted in significant modifications to the underlying memory encryption engine, removing integrity guarantees as well as protections against replay attacks. While Intel's and AMD's change in TEE implementation is clearly significant and substantial, most TEE deployments appear to fail to acknowledge the difference in security guarantees, assuming a stronger security model than truly afforded by the implementation.\r\n\r\nThus, in this talk we discuss the true protection offered by Intel's and AMD's newest TEE offerings against entry-level physical side-channel attacks. We show that, contrary to popular belief, bus interposition attacks on DDR server memory can be constructed cheaply by hobbyists, using parts easily obtained on e-commerce websites. Next, combining our ability to monitor DDR bus transactions with deterministic memory encryption used by Intel's SGX and TDX as well as AMD's SEV-SNP, we are able to extract secret key material (such as attestation keys in some cases) from machines in fully trusted status. Finally, we demonstrate the implications of our attacks on multiple real world TEE deployments.","affiliations":["Georgia Tech","Purdue University","van Schaik LLC"],"authors":["Jalen Chuang","Alex Seto","Nicolas Berrios","Stephan van Schaik","Christina Garman","Daniel Genkin"],"id":"talk-60","paperId":73,"title":"TEE.fail: Breaking Trusted Execution Environments via Memory Bus Interposition","speakers":"Christina Garman, Daniel Genkin"},{"abstract":"Our talk will present the story of how we built hardware-accelerated post-quantum cryptography\r\n(ML-DSA, ML-KEM, and SLH-DSA) on the OpenTitan root of trust. These implementations reflect a\r\nmulti-year, multi-national, multi-discipline effort spanning academia and industry, and are on track to be taped out in production systems at scale. We will discuss the challenges posed by the strict memory and performance requirements of a small embedded system, and how developing the software and hardware together informed our design choices. We will also position this effort in the larger context of global trends towards open-source hardware and post-quantum migrations, and talk about our future plans.","affiliations":["Max-Planck Institute for Security and Privacy","independent","zeroRISC","Chelpis Quantum Corp.","Academia Sinica and University of Southern Denmark","Fraunhofer Institute for Applied and Integrated Security (AISEC)","Rivos Inc."],"authors":["Amin Abdulrahman","Andrew 'bunnie' Huang","Evan Apinis","Matthias J. Kannwischer","Ruben Niederhagen","Felix Oberhansl","Hoang Nguyen Hien Pham","Jade Philipoom","Dominic Rizzo","Robert Schilling","Peter Schwabe","Tobias Stelzer","Augustine Tang","Andreas Zankl"],"id":"talk-67","paperId":116,"title":"Migrating a Silicon Root of Trust to Post-Quantum Crypto","speakers":"Hoang Nguyen Hien Pham, Jade Philipoom","slidesUrl":"https:\/\/iacr.org\/submit\/files\/slides\/2026\/rwc\/rwc2026\/116\/116_slides.pdf"},{"abstract":"Static side-channel analysis attacks, which rely on a stopped clock to extract sensitive information, pose a growing threat to embedded systems' security. To protect against such attacks, several proposed defenses aim to detect unexpected variations in the clock signal and clear sensitive states. In this talk, we present Chypnosis, an undervolting attack technique that indirectly stops the target circuit clock, while retaining stored data. Crucially, Chypnosis also blocks the state clearing stage of prior defenses, allowing recovery of secret information even in their presence. However, basic undervolting is not sufficient in the presence of voltage sensors designed to handle fault injection via voltage tampering. To overcome such defenses, we observe that rapidly dropping the supply voltage can disable the response mechanism of voltage sensor systems. We implement Chypnosis on various FPGAs, demonstrating the successful bypass of their sensors, both in the form of soft and hard intellectual property (IP) cores. To highlight the real-world applicability of Chypnosis, we show that the alert handler of the OpenTitan root-of-trust, responsible for invoking hardware responses to threats, can be bypassed. Furthermore, we demonstrate that by combining Chypnosis with static side-channel analysis techniques, namely laser logic state imaging (LLSI) and impedance analysis (IA), we can extract sensitive information from a side-channel protected cryptographic module used in OpenTitan, even in the presence of established clock and voltage sensors. Finally, we propose and implement an improvement to an established FPGA-compatible clock detection countermeasure, and we validate its resilience against Chypnosis.\r\n\r\nThe original paper will appear at IEEE Symposium on Security and Privacy (S&P) 2026. AMD and Microchip Technology publicly acknowledged the vulnerability in Security Briefs AMD-SB-8018 and PSIRT-118, respectively..","affiliations":["Worcester Polytechnic Institute","Ruhr University Bochum and The University of Adelaide","Ruhr University Bochum"],"authors":["Kyle Mitard","Saleh Khalaj Monfared","Fatemeh Khojasteh Dana","Robert Dumitru","Yuval Yarom","Shahin Tajik"],"id":"talk-68","paperId":120,"title":"Chypnosis: Undervolting-based Static Side-channel Attacks","speakers":"Shahin Tajik","slidesUrl":"https:\/\/iacr.org\/submit\/files\/slides\/2026\/rwc\/rwc2026\/120\/120_slides.pptx"},{"abstract":"The Kerckhoff's principle, a cornerstone of cryptographic theory, states that a cryptosystem's security should not rely on secrecy, but rather on the secrecy of the key. However, in the secure hardware space, secrecy is widespread, with vendors revealing minimal information about their implementations. This secrecy can lead to the delayed discovery of vulnerabilities, leading to more impactful attacks. What can we do to address this gap between cryptographic theory (Kerckhoff's) and the practice in the secure hardware space (security by obscurity)?\r\n\r\nIn this talk, we make the case against security by obscurity by demonstrating automated reverse-engineering of black-box elliptic curve cryptography (ECC) implementations on real-world devices, thereby showing that obscurity provides only a limited defense. We showcase two approaches to recovering key details of ECC implementations on JavaCards: using side-channels and using out-of-spec parameters.\r\n\r\nUsing our techniques, we were able to reverse-engineer scalar randomization countermeasures in several real-world implementations of JavaCards from major vendors. We will demonstrate how simple algebra and lying can be used to bypass the obscurity around these devices. Finally, we will discuss how security certifications reward obscurity and how we believe that there is a usable compromise that provides transparency and keeps the vendors' intellectual property secret. We take first steps towards this in the sec-certs.org project.","affiliations":["Masaryk University"],"authors":["Vojtech Suchanek","Jan Jancar","Jan Kvapil","Petr Svenda","\u0141ukasz Chmielewski"],"id":"talk-46","paperId":38,"title":"Kerckhoff's Principle in Practice: Addressing Security by Obscurity in Secure Hardware","speakers":"Jan Jancar","slidesUrl":"https:\/\/iacr.org\/submit\/files\/slides\/2026\/rwc\/rwc2026\/38\/38_slides.pdf"},{"abstract":"Recent development of microarchitectural weird machines (\u03bcWMs) has shown the potential of using microarchitectural components as an unexpected computation primitive. Researchers demonstrated that by using the CPU cache residency states, it is possible to compute a functionally complete circuit without leaving any visible traces in architectural states. This prevents existing analysis tools (e.g., debuggers) that can only inspect architectural states, providing a great candidate for stealthy computation and program obfuscation. In practice, however, the accuracy and performance of these \u03bcWMs are severely limited. For example, Katzman et al. (USENIX Security'23) take around 1 ms to compute just a single round of the SHA-1 hash function with an accuracy of only 58%.\r\n\r\nIn this talk, we show that \u03bcWMs can be both accurate and fast. We start with our new \u03bcWM architecture, Flexo, which adopts differential encoding to improve \u03bcWM performance by up to two orders of magnitude while enhancing the accuracy of the SHA-1 hash function to 99.8%. We then introduce transient architectural execution, a new computational primitive that allows \u03bcWMs to compute in the processor model rather than the circuit model. This enables weird programs that can take advantage of ISA instructions directly, making them up to two orders of magnitude faster than Flexo. Encrypting an AES block can now be done in 0.4 ms, achieving a high accuracy (96%). Finally, we present our \u03bcWM compiler that compiles high-level C\/C++ code to optimized \u03bcWMs. Using this compiler, we extend the popular UPX packer to encrypt its payload and use a \u03bcWM for decryption, frustrating malware analysis.\r\n\r\nThis talk is based on the USENIX Security'24 publication \"Bending microarchitectural weird machines towards practicality\" and \"Transient Architectural Execution: From Weird Gates to Weird Programs\", which is accepted to S&P'26.","affiliations":["Carnegie Mellon University","Tel Aviv University","Ruhr University Bochum"],"authors":["Ping-Lun Wang","Fraser Brown","Riccardo Paccagnella","Eyal Ronen","Riad S. Wahby","Yuval Yarom"],"id":"talk-29","paperId":4,"title":"Encryption in the microarchitectural world","speakers":"Ping-Lun Wang","slidesUrl":"https:\/\/iacr.org\/submit\/files\/slides\/2026\/rwc\/rwc2026\/4\/4_slides.pptx"}]}]},{"starttime":"18:45","endtime":"20:45","sessions":[{"id":"session-73","session_title":"Reception"}]}]},{"date":"2026-03-10","timeslots":[{"starttime":"9:00","endtime":"10:20","sessions":[{"id":"session-11","moderator":"Chair: Henry Corrigan-Gibbs          ","session_title":"Real World Privacy","talks":[{"abstract":"As people's communications move to the digital sphere, chat applications become a major target of content-based censorship. Previous work shows that various applications with millions of users have filtered, and then dropped, user messages containing \"sensitive words\". Given the regulatory restrictions, circumvention within the censored application is necessary. Several works propose steganographic circumvention schemes leveraging the recent development of generative models. These schemes embed sensitive information inside inconspicuous outputs generated by LLMs and provide formal guarantees of undetectable circumvention as indistinguishability, i.e., the generated stego text is statistically indistinguishable from benign model output without embedded information.\r\n\r\nIn this talk, we show that, surprisingly, there exists a significant gap between theoretical security guarantees in LLM-based steganographic schemes and the empirical undetectability when applying these schemes into the real-world circumvention scenario. To bridge this gap, we propose Oolong, an orchestrated protocol that can work with any LLM-based steganographic coders in a \"plug-in-and-go\" manner. To examine the effectiveness and security of our design, we conduct, to the best of our knowledge, the first empirical evaluation of steganographic circumvention systems using conversation data from the real world. The goal of our talk is to share our learnings on the design considerations necessary for bridging this gap and to encourage exchanges on several challenges remaining open towards real-world deployment.","affiliations":["MPI-SP and EPFL","TU Graz"],"authors":["Boya Wang","Markus Schifferm\u00fcller","Klim Kireev","Carmela Troncoso"],"id":"talk-30","paperId":5,"title":"Real-World Steganography Against Content-Based Censorship in Modern Chat Applications","speakers":"Boya Wang","slidesUrl":"https:\/\/iacr.org\/submit\/files\/slides\/2026\/rwc\/rwc2026\/5\/5_slides.pdf"},{"abstract":"The free press fulfils an important function in a democracy. It can provide individuals with a mechanism through which they can hold powerful people and organizations to account. A team at the University of Cambridge and The Guardian developed CoverDrop: a secure, anonymous, and usable method of establishing initial contact between journalists and sources embedded in a set of extensions to a typical news app.\r\n\r\nThis talk covers the five year journey from identifying the research problem to building a real-world system that is now deployed to millions of people running The Guardian app on their phone\u2014making it one of the largest anonymity networks supporting plausible deniability, and likely the one most-widely deployed to everyday users. We will highlight the cryptographic challenges involved when academic ideas meet reality, how simplicity has been critical in order to make the system work in practice, and share lessons learned about good cryptographic engineering.\r\n\r\nWe believe that this talk provides an important case study for researchers who want to identify and deliver real impact with their research. Although CoverDrop already runs at scale, there are more exciting opportunities ahead. We hope that this talk also connects people interested in the challenges in this space to find out more and help us with some of the many remaining unsolved problems, including any-trust message forwarding, support for post-quantum cryptography, formal verification of our protocols, etc.","affiliations":["University of Cambridge","The Guardian","Independent"],"authors":["Daniel Hugenroth","Luke Hoyland","Sam Cutler","Alastair Beresford"],"id":"talk-42","paperId":34,"title":"Deploying Research: On Building and Shipping an Anonymous Whistleblowing System","speakers":"Daniel Hugenroth","slidesUrl":"https:\/\/iacr.org\/submit\/files\/slides\/2026\/rwc\/rwc2026\/34\/34_slides.pdf"},{"abstract":"In the decade since SecureDrop was originally presented at RWC, the whistleblowing system has grown to serve major news organizations around the world. The current SecureDrop protocol design assumes the existence of an on-premises physical server infrastructure and encrypts traffic in transit and at rest, but not end-to-end. Unfortunately, the usability challenges in maintaining critical infrastructure on-premises have posed a barrier to deployment. We therefore present the process of developing a new iteration of the SecureDrop protocol, featuring end-to-end encrypted messaging and an architecture that allows for cloud-based deployment. The requirements of our redesigned system are informed by real-world deployment experience and feedback from current users. While no existing solution adheres fully to our constraints, we leverage well-established tools including Tor and HPKE. The new design provides hybrid (PQ\/traditional) confidentiality guarantees and anonymous message retrieval from the server. We briefly highlight a combined analysis approach using Tamarin and game-based proofs, and remaining challenges pre-deployment.","affiliations":["Freedom of the Press Foundation","ETH Zurich"],"authors":["Giulio Berra","Felix Linker","Luca Maier","Cory Francis Myers","Kenneth G. Paterson","Rowen Shane","Shannon Veitch"],"id":"talk-54","paperId":51,"title":"SecureDrop Next Generation: Lessons from a Decade of Deployment","speakers":"Rowen Shane, Shannon Veitch","slidesUrl":"https:\/\/iacr.org\/submit\/files\/slides\/2026\/rwc\/rwc2026\/51\/51_slides.pdf"},{"abstract":"We start from the observation in prior work that cryptography broadly intuits security goals \u2013 as modelled in games or ideal functionalities \u2013 while claiming realism. This stands in contrast to cryptography\u2019s attentive approach towards examining assumptions and constructions through cryptanalysis and reductions. To close this gap, we introduce a technique for determining security goals. Given that games and ideal functionalities model specific social relations between various honest and adversarial parties, our methodology is ethnography: a careful social science methodology for studying social relations in their contexts. As a first application of this technique, i.e. ethnography in cryptography, we study security at-compromise (neither pre- nor post-) and introduce the security goal of alert blindness. Specifically, in our 2024\/2025 six-and-a-half-month ethnographic fieldwork with protesters in Kenya, we observed that alert blindness captures a security goal of abducted persons who were taken by Kenyan security forces for their presumed activism. We show this notion is achievable under standard assumptions by providing a construction secure in our model. We discussed both the notion and the construction with some interlocutors in Kenya.","affiliations":["King's College London","Royal Holloway, University of London"],"authors":["Martin R. Albrecht","Simone Colombo","Benjamin Dowling","Rikke Bjerg Jensen"],"id":"talk-39","paperId":28,"title":"At-Compromise Security: The Case for Alert Blindness","speakers":"Simone Colombo","slidesUrl":"https:\/\/iacr.org\/submit\/files\/slides\/2026\/rwc\/rwc2026\/28\/28_slides.pdf"}]}]},{"starttime":"10:25","endtime":"10:55","sessions":[{"id":"session-12","session_title":"Coffee break"}]},{"starttime":"10:50","endtime":"11:20","sessions":[{"id":"session-14","session_title":"Invited Talk ","talks":[{"abstract":"Cryptography succeeds in the real world when more than the math lines up: performance, operations, UX, incentives, standards, and policy all determine what ships and what sticks. This talk draws lessons from three deployment waves: a brief look at encrypting by default at scale, the continuing journey of authentication from passwords through MFA to phishing resistance and AI agents, and the accelerating push toward digital identity and age assurance.\n\n\nThese security gains have come with real tradeoffs and some tough lessons. In digital identity, the privacy stakes are especially high: even well-intentioned deployments can create linkable records of sensitive activity and entrench non-quantum-safe choices just as post-quantum migration is finally underway. We\u2019ll close with concrete, technically grounded priorities for researchers, standards bodies, implementers, and regulators to make privacy-preserving, interoperable digital identity deployable at scale.","affiliations":"Yubico","authors":["Christopher Harrell"],"id":"talk-81","paperId":"inv-3","title":"Defending the Open Internet: TLS, Passkeys, and the Privacy Stakes of Digital Identity"}]}]},{"starttime":"11:20","endtime":"12:00","sessions":[{"id":"session-13","moderator":"Chair: Anja Lehmann","session_title":"Login Security","talks":[{"abstract":"Cloud-based password managers allow users to store their passwords in an online vault. The vault is typically protected by a master password, allowing users to easily access their credentials from multiple devices while only having to remember a single password. Most cloud-based password managers aim to provide end-to-end encryption (E2EE), or, as it is more commonly known in this space, \"zero-knowledge encryption.\"\r\n\r\nThe security promise is that only the user in possession of their master password can access and decrypt their vault. Or, in the words of Bitwarden, a leading vendor: \"Bitwarden team members cannot see your passwords. Your data remains end-to-end encrypted with your individual email and master password. [...] Only you have access to your data. Not even the team at Bitwarden can read your data (even if we wanted to).\" Similar claims are made by most providers, such as 1Password, LastPass, ProtonPass, and Keeper.\r\n\r\nIn this talk, we show that several well-known cloud-based password managers, including Bitwarden, fail to meet this security goal. We present severe attacks on Bitwarden, LastPass, and Dashlane in the E2EE threat model. The attacks allow a malicious or compromised server to read and modify user credentials in the vault, and\u2014in the most serious cases\u2014fully compromise user vaults.\r\n\r\nGiven the sensitive nature of credentials stored by password managers, the severity and prevalence of vulnerabilities among these providers are worrying. They show that the usability and security of passwords are still among the most important open problems in real-world cryptography. Beyond proposing specific mitigations for the attacks we discovered, we therefore ask why these issues arose and what we can do to prevent them. We provide a systematization of the vulnerabilities and their causes and argue for several security properties that cloud-based password managers should provide (simple to state, but non-trivial to achieve). We end with a discussion on relations to other open problems in applied cryptography and avenues for future work.","affiliations":["ETH Zurich"],"authors":["Matilda Backendal","Kenneth Paterson","Matteo Scarlata","Giovanni Torrisi"],"id":"talk-37","paperId":25,"title":"Zero Knowledge (About) Encryption: On the Security of Cloud-based Password Managers","speakers":"Matteo Scarlata, Giovanni Torrisi","slidesUrl":"https:\/\/iacr.org\/submit\/files\/slides\/2026\/rwc\/rwc2026\/25\/25_slides.pdf"},{"abstract":"Account compromise remains a common threat, particularly for people experiencing interpersonal abuse. Account security interfaces (ASIs) are meant to help users detect and respond to such compromise; however, they have received little systematic attention, despite their central role in user safety. One problem with ASIs is that the information they present can be easily spoofed, making them unreliable. Including more trustworthy information, such as serial numbers, would provide users with reliable evidence of malicious logins. However, this goes against best practices for protecting user privacy, as it can enable platforms to track users. Therefore, we are presented with a seemingly fundamental tensions between privacy from providers and accountability to users.\r\n\r\nIn this talk, we introduce client-side access logging (CSAL) to address this tension. CSAL adds encrypted logging functionality to modern authentication frameworks (such as WebAuthn and passkeys). For this, we rely on support from the operating system to provide and encrypt sensitive information about the device during authentication to a web service. The encrypted entry is stored in a log that only authenticated devices can decrypt. In particular, the web service is blinded from information that could enable device tracking. We present two design directions and invite discussion on how such mechanisms could be integrated into the WebAuthn and FIDO ecosystems to improve user safety at scale.","affiliations":["Cornell University","TU Wien","Cornell Tech"],"authors":["Carolina Ortega P\u00e9rez","Paul Gerhart","Alaa Daffalla","Thomas Ristenpart"],"id":"talk-48","paperId":41,"title":"Improving Account Security for Victims of Account Compromise through Client-Side Access Logging","speakers":"Carolina Ortega P\u00e9rez and Paul Gerhart","slidesUrl":"https:\/\/iacr.org\/submit\/files\/slides\/2026\/rwc\/rwc2026\/41\/41_slides.pdf"}]}]},{"starttime":"12:00","endtime":"13:30","sessions":[{"id":"session-15","session_title":"Lunch"}]},{"starttime":"13:30","endtime":"14:50","sessions":[{"id":"session-16","moderator":"Chair: Douglas Stebila","session_title":"Post-Quantum Constructions","talks":[{"abstract":"Post-quantum cryptography is on the horizon, and the first standards for new key exchange mechanisms (KEMs) are already out. But while these schemes are being rolled out by major players like Apple and Google, they haven\u2019t yet had the decades of scrutiny that RSA or elliptic curves went through.\nTo hedge bets, many agencies and companies now recommend \u201chybrid\u201d approaches: combining a classical and a post-quantum KEM\u2014or even two post-quantum ones\u2014so that if one fails, the other still ensures protection. The big question is how to actually combine them. Some constructions are heavy but conservative, others lighter but less obviously safe, and opinions differ on what\u2019s \u201cgood enough\u201d in practice.\n\nThis talk will give an overview of the main hybrid approaches, explain what\u2019s at stake, and sketch when the less conservative designs might still be perfectly fine to use in real systems.","affiliations":"Eindhoven University of Technology, NL,Selkie Cryptography, USA,Federal Office for Information Security, Germany, Eindhoven University of Technology, NL and SandboxAQ, USA","authors":["Kathrin H\u00f6velmanns","Deirdre Connolly","Andreas H\u00fclsing","Stavros Kousidis","Matthias Meijers"],"id":"talk-43","paperId":"35","title":"Keeping up with the KEMbiners","speakers":"Deirdre Connolly and Kathrin H\u00f6velmanns"},{"abstract":"We present the first practical threshold signature protocol fully compatible with the FIPS~204 ML-DSA standard. It will be proposed to the NIST Multi-Party Threshold Cryptography (MPTC) Call, and already appears as a strong contender for Post-Quantum Primitives. Our design resolves the long-standing tension between ML-DSA's abort-and-retry signing and MPC by enabling local rejection sampling on short replicated shares, removing costly global abort coordination. It supports both Distributed Key Generation and a posteriori key sharing, preserving the verification key, and remains efficient at least up to six parties\u2014covering 2-of-2 and 2-of-3 deployments commonly used in industry\u2014while keeping per-party communication under 1 MB.\r\nWe implemented our scheme in Go (extending CIRCL) and evaluated it on WAN topologies; a 2-of-3 signature takes sub-millisecond locally and 27 ms across Taipei\u2013Seoul, while a 6-of-6 global run completes in 660 ms. These results make drop-in, PQ-secure threshold ML-DSA viable today, including for applications such as wallets, CDN\/TLS key management, and Tor's consensus infrastructure. In this talk, we will touch on the design of the scheme with an emphasis on how it works for realistic use cases.","affiliations":["PQShield, Univ Rennes, CNRS, IRISA","PQShield","Brave, University of Bristol"],"authors":["Guilhem Niot","Thomas Espitau","Thomas Prest","Rafael del Pino","Sof\u00eda Celi"],"id":"talk-28","paperId":1,"title":"Efficient Threshold ML-DSA","speakers":"Sofia Celi, Thomas Espitau","slidesUrl":"https:\/\/iacr.org\/submit\/files\/slides\/2026\/rwc\/rwc2026\/1\/1_slides.pdf"},{"abstract":"Signal's initial handshake protocol X3DH\/PQXDH allows parties to asynchronously derive a shared session key without the need to be online simultaneously, while providing implicit authentication, forward secrecy, and a form of offline deniability. Extensively studied in the cryptographic literature, it is acclaimed for its strong \"maximum-exposure\" security guarantees, hedging against compromises of users' long-term keys and medium-term keys but also the ephemeral randomness used in the handshake. Remarkably, Signal's current approach of concatenating plain DH combinations is however sub-optimal, both in terms of maximum-exposure security and performance.\r\n\r\nIn this talk, we will present XHQMV, a carefully adapted variant of Krawczyk's well-known HMQV protocol (Crypto '05), which enables both stronger security and better efficiency while matching the constraints of Signal's initial handshake. Notably, HMQV does not work as a drop-in replacement for X3DH due to the the latter's asynchronicity requirements and the need to handle cases where one party runs out of ephemeral keys (pre-uploaded to the Signal server). We will show how to augment HQMV with the necessary medium-term keys, enabling security in 1-2 additional compromise scenarios compared to X3DH while using more efficient group operations. Signal plans to adopt XHQMV and in our talk, we will explain how Signal's transition to a fully hybrid traditional\/quantum-safe protocol opens a window of opportunity to improve on such a core cryptographic component, and discuss the engineering trade-offs involved.","affiliations":["ETH Zurich","IBM Research Europe \u2013 Zurich","University of Kassel","Signal Messenger"],"authors":["Rune Fiedler","Felix G\u00fcnther","Jiaxin Pan","Runzhi Zeng","Rolfe Schmidt"],"id":"talk-55","paperId":56,"title":"XHMQV: Better Efficiency and Stronger Security for Signal's Initial Handshake based on HMQV","speakers":"Rune Fiedler","slidesUrl":"https:\/\/iacr.org\/submit\/files\/slides\/2026\/rwc\/rwc2026\/56\/56_slides.pdf"},{"abstract":"Today's real-world cryptographic systems face the challenge of transitioning to quantum-safe, both quickly and efficiently. But what if a system's cryptography is so complex that no fully quantum-safe solution exists today, yet the quantum threat of Harvest-Now-Decrypt-Later (HNDL) attacks is already pressing? In this talk, we study such a deployment, Signal's Private Group System, and discuss how a careful design analysis can enable transitioning the most vulnerable components first, while maintaining both efficiency and a pathway to full quantum safety.\r\n\r\nSignal's so-called Private Group System allows users to manage groups (creation, adding\/removing members, etc.) in a privacy-preserving manner, i.e., such that the server never learns the members of the group while simultaneously being able to check the legitimacy of these operations. Signal's current system uses an elaborate combination of classical primitives (zero-knowledge proofs, verifiable encryption, oblivious pseudorandom functions, etc.), combined in complex and non-black-box ways. This makes transitioning to quantum-safe challenging, yet such transition is urgent: social graph information and group membership data is highly privacy-sensitive, making Signal's Private Group System a primary target for HNDL attacks.\r\n\r\nIn this talk, we will present ongoing work on transitioning Signal's Private Group System. We propose to carefully rethink the design of complex cryptographic systems to focus on countering the HNDL threat first, while keeping a pathway to a fully quantum-safe system open. Our approach reduces the need for advanced building blocks as much as possible and avoids non-black-box use of primitives, e.g., by shifting some responsibilities from the server to the clients. At the example of Signal's Private Group System, we will discuss lessons learned and quantum-safe migration strategies that are applicable more broadly to today's real-world cryptographic systems.","affiliations":["Signal Messenger","IBM Research Europe - Zurich, ETH Zurich","IBM Research Europe - Zurich"],"authors":["Graeme Connell","Sebastian Faller","Felix G\u00fcnther","Julia Hesse","Vadim Lyubashevsky","Rolfe Schmidt"],"id":"talk-64","paperId":96,"title":"A Call to Action: Transitioning Signal's Private Group System to Quantum-Safe","slidesUrl":"https:\/\/iacr.org\/submit\/files\/slides\/2026\/rwc\/rwc2026\/96\/96_slides.pdf"}]}]},{"starttime":"14:55","endtime":"15:35","sessions":[{"id":"session-75","moderator":"Chair: Joseph Bonneau","session_title":"Cloud Encryption","talks":[{"abstract":"Collaborative documents (e.g., Google Docs, Microsoft 365) often contain sensitive information such as personal or financial data. In this work, we extend the protection of E2EE encryption, currently (mostly) restricted to the use case of messaging, to collaborative documents. We elicit and formalize the security and functional requirements of End-to-End Encrypted Collaborative Documents (E2EE-CD). We then put forth a generic framework to realize E2EE-CD, by combining an end-to-end encrypted asynchronous broadcast channel with any edit reconciliation mechanism which ensures globally consistent views of a document. We give formal proofs that directly relate the security of our E2EE-CD solution to the security of the underlying end-to-end encrypted communication channel. We then elicit additional deployment requirements for E2EE-CD for investigative journalists and design SignalCD, an E2EE-CD system built on top of Signal\u2019s group messaging protocol tailored for this setting. We analyze the security guarantees of SignalCD, implement a prototype, and empirically show that our solution is efficient enough to permit real-time collaboration.","affiliations":["EPFL","MPI-SWS","EPFL, MPI-SP"],"authors":["Christian Knabenhans","Zayd Maradni","Carmela Troncoso"],"id":"talk-34","paperId":20,"title":"End-to-End Encrypted Collaborative Documents","speakers":"Christian Knabenhans, Zayd Maradni","slidesUrl":"https:\/\/iacr.org\/submit\/files\/slides\/2026\/rwc\/rwc2026\/20\/20_slides.pdf"},{"abstract":"A ubiquitious problem in large-scale production environments is online encryption of large messages (e.g., databases, video streams, etc.), that is, encryption while using a small amount of memory. While straightforward when only (unauthenticated) encryption is required---say, by encrypting\/decrypting in chunks, using a standard encryption scheme---this is more challenging in the presence of active attackers, who may drop or reorganize ciphertext segments arbitrarily. Moreover, many uses cases additionally require both encryption and decryption to be random access, meaning that messages (resp., ciphertexts) can be encrypted (resp., decrypted) in any order.\r\n\r\nThe purpose of this talk is to present the design of FLOE (Fast\r\nLightweight Online Encryption), a new random-access online AEAD scheme. FLOE was designed in close collaboration with Snowflake, a leading cloud company, where it is slated to be deployed in production to protect sensitive user data. Requiring online encryption of large files, Snowflake encountered a number of real-world challenges with existing schemes, which motivate the design of a new construction.","affiliations":["Cornell University","Snowflake","UNC Chapel Hill","Cornell Tech"],"authors":["Andres Fabrega","Greg Rubin","Julia Len","Thomas Ristenpart"],"id":"talk-69","paperId":125,"title":"Random-Access AEAD for Fast Lightweight Online Encryption","speakers":"Andres Fabrega, Gregory Rubin","slidesUrl":"https:\/\/iacr.org\/submit\/files\/slides\/2026\/rwc\/rwc2026\/125\/125_slides.pdf"}]}]},{"starttime":"15:35","endtime":"16:05","sessions":[{"id":"session-17","session_title":"Coffee Break"}]},{"starttime":"16:05","endtime":"17:35","sessions":[{"id":"session-18","moderator":"Chair: Nick Sullivan","session_title":"Cryptography and Society","talks":[{"abstract":"The European Commission\u2019s 2022 proposal for a regulation on child sexual abuse material, commonly known as ChatControl, would oblige online services to detect, report, and remove prohibited content through client-side scanning. This work examines ChatControl as a case study in how regulatory ambitions can outpace technical reality. It argues that the proposal rests on an unverified assumption\u2014that universal message inspection before encryption is both feasible and rights-compatible. By analyzing the policy's technical architecture alongside its institutional motivations, the study shows how cryptographic concepts are being reinterpreted as instruments of governance. End-to-end encryption, once a guarantee of private communication, is reframed as a conditional privilege contingent on compliance with state-defined scanning regimes. The talk situates this transformation within broader debates on proportionality, technological sovereignty, and the political use of ``safety'' as justification for surveillance. Ultimately, it argues that the ChatControl controversy is not only about privacy or child protection but about the boundaries of legitimate scientific authority\u2014what counts as secure, who decides, and under what political pressures.","affiliations":["Aarhus University","IRIF, CNRS & Universit\u00e9 Paris Cit\u00e9"],"authors":["Diego F. Aranha","Nikolas Melissaris"],"id":"talk-70","paperId":129,"title":"What is cryptography hiding from itself?","speakers":"Nikolas Melissaris"},{"abstract":"Concerns about big tech's monopoly power have featured prominently in recent media and policy discourse, as regulators across the EU, the US, and beyond have ramped up efforts to promote healthier market competition. One favored approach is to require certain kinds of interoperation between platforms, to mitigate the current concentration of power in the biggest companies. Unsurprisingly, interoperability initiatives have generally been met with resistance by big tech companies. Perhaps more surprisingly, a significant part of that pushback has been in the name of security---that is, arguing against interoperation on the basis that it will undermine security.\r\n\r\nOur talk will present a systematic examination of  \u201csecurity vs. interoperability\u201d' (SvI) discourse in the context of EU antitrust proceedings. First, we will introduce our taxonomy of SvI concerns in three categories: engineering, vetting, and hybrid. Second, we will discuss an analytical framework for assessing real-world SvI concerns, and illustrate its utility using some of our case studies from different taxonomy categories.  Third, we will touch on our comparative analysis, which highlights key considerations around the interplay of economic incentives, market power, and security.","affiliations":["New York University","Northeastern University"],"authors":["Daji Landis","Sunoo Park","Elettra Bietti"],"id":"talk-58","paperId":69,"title":"\"Security vs. Interoperability'': Real Tension or False Dichotomy?","speakers":"Daji Landis","slidesUrl":"https:\/\/iacr.org\/submit\/files\/slides\/2026\/rwc\/rwc2026\/69\/69_slides.pdf"},{"abstract":"We report on our experiences with the ongoing European standardization efforts related to the EU Cyber Resilience Act (CRA) and provide interim estimates on the direction that European cryptography regulation may take, particularly concerning the algorithm ``allow list'' and the enforcement of the PQC transition in products. We also outline some of the risks associated with the partially closed standardization process: Lack of public review leading to lower quality, impact minimization by vendors, and increased potential for backdoors.\r\n\r\nThe Cyber Resilience Act came into effect in December 2024, and its obligations will fully take effect for makers of \"products with digital elements\" (most smart consumer electronics and many types of software) from 2027. CRA compliance is a requirement for obtaining the CE mark and a prerequisite for selling products in the European Single Market, which comprises 450 million people. The CRA has a wide-ranging set of security requirements, including security patching and direct cryptographic requirements (data integrity, confidentiality for data at rest and data in transit). However, the Cyber Resilience Act itself is a legal text devoid of technical detail -- it does not specify the type of cryptography deemed appropriate to satisfy its requirements.\r\n\r\nThe technical implications of CRA are expected to be detailed in approximately 40 new standards from the three European standardization organizations, CEN, CENELEC, and ETSI. While the resulting ETSI standards can be expected to be available for free, the CEN and CENELEC standards will probably not be available to the public before they are finished, and even then, only for a per-reader license fee. This, despite recent legal rulings asserting that product security and safety standards are part of EU law due to their legal effects.\r\n\r\nTaking a recent example of such standards, we observe that the actual cryptographic requirements set out in EN 18031 series, the Radio Equipment Directive (RED) harmonised standard from 2024 (which is in many ways a direct predecessor of CRA), allow vendors to take a no-foresight approach where weak cryptography may be considered ``best practice'' right until exploitation is feasible.\r\n\r\nRecognizing the weakness of the previous ``best practice'' definition and additional requirements such as the EU Post-Quantum Cryptography transition roadmap, CRA standardization working groups are currently moving towards a model where approved cryptography is listed by the European Cybersecurity Certification Group (ECCG) as a single source of truth. CRA products may still support other cryptographic mechanisms, but only approved algorithms are permitted as safe defaults.","affiliations":["Tampere University"],"authors":["Markku-Juhani Saarinen"],"id":"talk-66","paperId":102,"title":"CRA and Cryptography: The Story Thus Far","speakers":"Markku-Juhani Saarinen","slidesUrl":"https:\/\/iacr.org\/submit\/files\/slides\/2026\/rwc\/rwc2026\/102\/102_slides.pptx"},{"abstract":"This talk argues that cryptographers should extend the expectations for the documentation accompanying proposals for real-world deployment.   System designers should explicitly articulate the desired socio-technical properties of the systems they design. We propose a lightweight, \u201ccryptography-native\u201d framework for contextual analysis of cryptosystems that interoperates with simulation-based security and supports reasoning systematically about the socio-technical properties a system will have when deployed. Through an illustrative case study, we show how this approach exposes overlooked interactions between technical mechanisms and their real-world environments, revealing why context must become an integral part of cryptographic analysis.","affiliations":["University of Maryland","Boston University"],"authors":["Gabriel Kaptchuk","Ran Canetti","Julie Ha"],"id":"talk-59","paperId":71,"title":"When Proofs Aren\u2019t Enough: Putting Cryptosystems in Context","speakers":"Gabriel Kaptchuk","slidesUrl":"https:\/\/iacr.org\/submit\/files\/slides\/2026\/rwc\/rwc2026\/71\/71_slides.pptx"},{"abstract":"This talk presents field reports from teaching applied cryptography to 55 students at the American University of Beirut during 2025, navigating hourly power outages, post-conflict infrastructure, and the constant possibility of renewed violence. Beyond traditional education, this initiative addresses a critical deployment challenge: how to rapidly build local cryptographic expertise in regions where secure communications are essential for civil society, economic recovery, and democratic participation. In effect, this initiative had the goal of training cryptographers where Signal's triple ratchet, iOS's BlastDoor sandbox, and WhatsApp's encrypted backups are lifelines, not conveniences.\r\n\r\nThe course design makes great effort to balance practical implementation with the rigor of provable security, with students building production-ready tools including secure messengers, password managers, and zero-knowledge applications using modern languages (Go\/Rust) and formal verification techniques. Early results demonstrate that students with no prior cryptography experience can, within one semester, implement sophisticated protocols including Signal's Double Ratchet, post-quantum hybrid systems, and zkVM-based applications. In some cases, students even improved on the state-separable proofs in their textbooks, coming up with shorter and more elegant hybrid proofs for some constructions.\r\n\r\nKey takeaways include: (1) course design decisions that enabled introducing provable security foundations and progressing towards teaching advanced topics (PQ crypto, ZK proofs, formal verification) despite a lack of prior knowledge in cryptography, (2) unexpected advantages of teaching cryptography where its applications are viscerally understood, and (3) a reproducible model for building cryptographic capacity in underserved regions.\r\n\r\nThe talk will also share uncomfortable lessons for the global cryptography community about the cost of geographical concentration of expertise, which creates dangerous capability gaps precisely where secure systems are most critical. I'll share concrete lessons about teaching formal verification to students driving to university on roads that had suffered a drone bombing hours earlier, running lab sessions with backup batteries, and why students who've lived through communications blackouts intuitively understand threat models that take pages to explain elsewhere.\r\n\r\nThe talk will present a reproducible model for rapidly building cryptographic capacity in crisis regions, challenging our community to reconsider where and how we deploy our expertise: all resulting course materials which took over five months of work to prepare and which include 1,500+ slides, eight project sheets, eight problem sets and more, are published at https:\/\/appliedcryptography.page under a highly permissive Creative Commons license, allowing for their reuse.","affiliations":["American University of Beirut"],"authors":["Nadim Kobeissi"],"id":"talk-36","paperId":22,"title":"Building Cryptographic Intellectual Infrastructure Where It Means Most: Lessons from Teaching Applied Cryptography in Post-Crisis Lebanon","speakers":"Nadim Kobeissi","slidesUrl":"https:\/\/iacr.org\/submit\/files\/slides\/2026\/rwc\/rwc2026\/22\/22_slides.pdf"}]}]},{"starttime":"17:45","endtime":"19:45","sessions":[{"id":"session-80","session_title":"Light Food and Beer"}]}]},{"date":"2026-03-11","timeslots":[{"starttime":"9:00","endtime":"10:20","sessions":[{"id":"session-20","moderator":"Chair: Thomas Ristenpart","session_title":"Privacy-Enhancing Technologies","talks":[{"abstract":"At RWC 2016, the Tor project expressed the need to upgrade Tor's onion encryption scheme to protect against tagging attacks and thereby strengthen its end-to-end integrity protection. In 2016 Nick Matthewson described a concrete onion encryption in Tor proposal 261, where each encryption layer is processed by a strongly secure, yet relatively expensive, tweakable wide-block cipher. Shortly after, Ashur, Dunkelman, and Luykx argued that replacing Tor's Counter-mode encryption with an tweakable wide-block cipher would be an overkill and replacing it instead with the RUP-secure AEAD scheme should suffice. Their intuition turned out to be fairly correct, however, translating said intuition into a secure onion encryption scheme for Tor is far from straightforward. In fact, several unsuccesful attempts followed at describing a concrete scheme for Tor in proposal 295.\r\n\r\nCurrently, proposal 359 \"Counter Galois Onion, Updated\" authored by Tor's Nick Mathewson \r\nis the main candidate to become the new onion encryption scheme for Tor and it is already being integrated in Arti, Tor's next-generation implementation in Rust, with plans to be deployed in the near future. Proposal 359 does not describe the design rationale of Counter Galois Onion (CGO), but rather refers to our work instead (eprint 2025\/583), where we identify the functionality and security desiderata for Tor's onion encryption, and propose CGO, an alternative onion encryption scheme that follows a minimalistic, modular design and includes several improvements over proposals 261 and 295. \r\n\r\nIn this talk, we will explain the design rationale behind CGO and the challenges that need \r\nto be overcome for successful deployment in the real world. We will concentrate on the technical \r\nside, where we discuss how to turn a relatively simple underlying primitive (think wide blockcipher) into a fully-fledged onion encryption scheme, but we will also detail our interactions with Mathewson to ensure that CGO would actually solve the problems the Tor community cares most about. For instance, for Tor latency is key, requiring an efficient onion encryption scheme. In CGO's case, we use as underlying primitive an updatable tweakable split-domain cipher, which is an augmentation of the recently introduced rugged pseudorandom permutation (Degabriele and Karadzic, CRYPTO 2022) that allows for more efficient designs than the tweakable wide-block cipher suggested in proposal 261. \r\n\r\nWe will also address the choices behind our concrete instantiation for the updatable tweakable\r\nsplit-domain cipher, called UIV+  and use it to benchmark our full CGO scheme against Tor's existing onion encryption scheme, demonstrating a clear performance gain at the proxy and at exit and entry routers, at the expense of a mild slowdown at intermediate routers. Both CGO and UIV+ are accompanied by formal security proofs that solidify the informal security claims. For this talk, we will concentrate on the informal, intuitive security that is provided by CGO.","affiliations":["Technology Innovation Institute","Simula UiB","TU Darmstadt"],"authors":["Jean Paul Degabriele","Alessandro Melloni","Jean-Pierre M\u00fcnch","Martijn Stam"],"id":"talk-62","paperId":87,"title":"Counter Galois Onion (CGO): Fast Non-Malleable Onion Encryption for Tor"},{"abstract":"Private-aggregation systems allow a company to collect valuable telemetry data from their users without ever having to collect sensitive disaggregated user data in the clear. The past few years have seen a flurry of activity around private aggregation: practical constructions, draft IETF standards, proof-of-concept deployments by Apple, Google, and Mozilla, and multiple Real World Crypto presentations. In spite of this progress, few of the apps we use today actually collect telemetry data using private aggregation.\r\n\r\nThis talk will try to answer two questions: Why is the real-world use of private-aggregation systems so limited? And what can we do about it? To do so, we will draw on our experience designing private-aggregations systems and on conversations with engineers at Apple, Cloudflare, Google, Mozilla, and ISRG who have deployed them.","affiliations":["MIT","Stanford","UT Austin"],"authors":["Ryan Lehmkuhl","Henry Corrigan-Gibbs","Emma Dauterman","David J. Wu"],"id":"talk-53","paperId":49,"title":"Let\u2019s Aggregate? Towards making private telemetry as ubiquitous as TLS","speakers":"Ryan Lehmkuhl"},{"abstract":"Behavioral advertising, in which people are preferentially shown advertisements that align with their interests and demographics, has become the financial backbone of the internet and the default business model for large swaths of the technology sector. In response to growing concerns about invasive advertising practices, researchers and technology companies have proposed a shift towards \u201cprivacy-preserving advertising systems,\u201d a collection of proposals that aim to maintain the existing advertising business model while making the process of (1) targeting advertisements and (2) reporting metrics on advertisement efficacy in a privacy-preserving manner.\r\n\r\nIn this talk, we take a step back to re-examine ``privacy-preserving advertising systems'' from first principles. This choice is motivated by the desire to better understand what is possible to achieve when adding privacy to advertising when, largely, the concept feels like an oxymoron. We model the end-to-end pipeline of the advertising ecosystem, allowing us to identify two main issues with the current trajectory of private advertising proposals.\r\n\r\nFirst, prior work has largely considered ad targeting and engagement metrics individually rather than in composition. This has resulted in privacy notions that, while reasonable for each protocol in isolation, fail to compose to a natural notion of privacy for the ecosystem as a whole, permitting advertisers to extract new information about the audience of their advertisements. The second issue serves to explain the first: we prove that perfect privacy is impossible for any, even minimally, useful advertising ecosystem, due to the advertisers' expectation of conducting market research on the results.\r\n\r\nHaving demonstrated that leakage is inherent in advertising, we re-examine what privacy could realistically mean in advertising, shifting away from Differential Privacy-style individual privacy guarantees towards definitions that cover group privacy. Existing normative privacy notions such as Contextual Integrity and Attribute Privacy offer an avenue to better characterize what information is appropriate for advertisers to learn about their audiences. We identify that fundamentally new approaches are needed when designing privacy-preserving advertising subsystems in order to ensure that the privacy properties of the end-to-end advertising system are well aligned with people's privacy desires.","affiliations":["MIT","Baruch College","UMD","Boston University"],"authors":["Kyle Hogan","Alishah Chator","Gabriel Kaptchuk","Mayank Varia","Srinivas Devadas"],"id":"talk-56","paperId":60,"title":"How Private Can Private Advertising Really Be?","speakers":"Alishah Chator"},{"abstract":"In recent years, differential privacy (DP) has been applied beyond statistical data release to strengthen the privacy guarantees of various systems, but the resulting privacy guarantees in these settings are rarely scrutinized. \r\nWe show that simply adding DP to a system may not deliver the expected protections, because DP\u2019s guarantees can misalign with the security and privacy requirements of the system it is intended to enhance. \r\nAs a case study, we analyze two searchable-encryption schemes that claim that their access-pattern leakage satisfies differential privacy and thereby offer strong privacy guarantees with better utility than fully oblivious alternatives. \r\nUnfortunately, these schemes fail to achieve their goals: we mount inference attacks that approximate
